<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Planning Collaboratif</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ── Login ── -->
<div id="login-overlay">
  <div class="login-card">
    <div class="login-logo">📅</div>
    <h1>Planning Collaboratif</h1>
    <p>Entrez votre pseudo pour rejoindre</p>
    <input id="pseudo-input" type="text" placeholder="Votre prénom ou pseudo…" maxlength="24" autocomplete="off"/>
    <button id="btn-join">Rejoindre →</button>
  </div>
</div>

<div class="app">

  <!-- ── Sidebar plannings ── -->
  <div id="projects-sidebar">
    <div id="projects-header">
      <span>Mes plannings</span>
    </div>
    <div id="projects-list"></div>
    <button id="btn-new-project" onclick="creerPlanning()">+ Nouveau planning</button>
  </div>

  <!-- ── Main ── -->
  <div class="app-main">

    <!-- Top bar -->
    <div id="topbar">
      <button id="mobile-proj-btn" onclick="ouvrirDrawerMobile()">☰ Plannings</button>
      <span class="logo" style="display:none" id="logo-desk">📋</span>
      <h2 id="project-title" title="Double-cliquer pour renommer" ondblclick="renommerPlanning()">Planning</h2>
      <div id="users-bar">
        <span id="users-label">0 connecté</span>
        <div id="users-dots" style="display:flex;gap:3px;margin-left:4px"></div>
      </div>
      <span id="save-indicator">✓ Sauvegardé</span>
    </div>

    <!-- Toolbar -->
    <div id="toolbar">
      <button class="btn btn-primary" onclick="ajouterProjet()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Ajouter
      </button>
      <button class="btn btn-success" onclick="sauvegarder()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Enregistrer
      </button>
      <button class="btn" onclick="telechargerSauvegarde()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Sauvegarde locale
      </button>
      <button class="btn" onclick="scrollAujourdhui()">📍 Aujourd'hui</button>
      <div class="sep"></div>
      <button class="btn" onclick="ouvrirConfigTech()">⚙ Attributions</button>
      <button class="btn" onclick="ouvrirConfigCols()">⚙ Colonnes</button>
      <button class="btn btn-danger" onclick="ouvrirExportPDF()">📄 Export PDF</button>
      <button class="btn" onclick="toggleHistory()">🕐 Historique</button>
      <div class="sep"></div>
      <div class="zoom-grp">
        <button onclick="setZoom(-2)">−</button>
        <span id="zoomLbl">14px</span>
        <button onclick="setZoom(2)">+</button>
      </div>
      <div class="year-sel">
        <span>Année</span>
        <select id="anneeSelect" onchange="changerAnnee(this.value)"></select>
      </div>
    </div>

    <!-- Gantt -->
    <div id="gantt-wrap">
      <div id="gantt-inner"></div>
    </div>

    <!-- Mobile -->
    <div id="mobile-view"></div>

  </div><!-- /app-main -->
</div><!-- /app -->

<!-- Drawer mobile plannings -->
<div id="mobile-drawer">
  <div id="mobile-drawer-bg" onclick="fermerDrawerMobile()"></div>
  <div id="mobile-drawer-panel">
    <div class="drawer-header">
      <span>Mes plannings</span>
      <button onclick="fermerDrawerMobile()">✕</button>
    </div>
    <div id="mobile-drawer-list"></div>
    <button id="mobile-drawer-new" onclick="creerPlanning();fermerDrawerMobile()">+ Nouveau planning</button>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="modal">
  <div class="modal" id="modal-body"></div>
</div>

<!-- History -->
<div id="history-panel">
  <div id="history-header">
    <span>🕐 Historique</span>
    <button class="btn" onclick="toggleHistory(false)" style="padding:3px 10px">✕</button>
  </div>
  <div id="history-list"></div>
</div>

<!-- Toast -->
<div id="toast-box"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="websocket.js"></script>
<script src="gantt.js"></script>
<script>
(async () => {
  /* ── Login ── */
  const overlay = document.getElementById('login-overlay');
  const input   = document.getElementById('pseudo-input');
  document.getElementById('btn-join').onclick = join;
  input.addEventListener('keydown', e => { if (e.key === 'Enter') join(); });

  function join() {
    const p = input.value.trim();
    if (!p) { input.focus(); return; }
    overlay.style.display = 'none';
    startApp(p);
  }

  async function startApp(pseudo) {
    /* Charger la liste des plannings */
    const projects = await fetch('/api/projects').then(r => r.json());
    renderProjectsList(projects, pseudo);

    /* Charger le premier planning */
    const first = projects[0];
    await loadProject(first.id, pseudo, true);
  }

  /* ── Liste des plannings ── */
  window._pseudo = '';
  window._currentProjectId = '';

  function renderProjectsList(projects, pseudo) {
    window._pseudo = pseudo;
    const list = document.getElementById('projects-list');
    list.innerHTML = '';
    projects.forEach(p => {
      const div = document.createElement('div');
      div.className = 'proj-item' + (p.id === window._currentProjectId ? ' active' : '');
      div.dataset.id = p.id;
      div.innerHTML = `
        <span class="proj-icon">📋</span>
        <span class="proj-name" title="${p.name}">${p.name}</span>
        <div class="proj-actions">
          <button class="proj-btn" onclick="renommerPlanningId('${p.id}','${p.name}')" title="Renommer">✏</button>
          <button class="proj-btn del" onclick="supprimerPlanning('${p.id}')" title="Supprimer">✕</button>
        </div>`;
      div.addEventListener('click', e => {
        if (e.target.closest('.proj-actions')) return;
        loadProject(p.id, pseudo, false);
      });
      list.appendChild(div);
    });
  }

  async function refreshProjectsList() {
    const projects = await fetch('/api/projects').then(r => r.json());
    renderProjectsList(projects, window._pseudo);
  }

  /* ── Charger un planning ── */
  async function loadProject(id, pseudo, first) {
    window._currentProjectId = id;
    const proj = await fetch(`/api/projects/${id}`).then(r => r.json());

    document.getElementById('project-title').textContent = proj.name;
    document.querySelectorAll('.proj-item').forEach(el =>
      el.classList.toggle('active', el.dataset.id === id));

    ganttApp.init(proj.data || {}, pseudo, id);

    if (first) {
      ganttSocket.connect(pseudo, id);
      setupSocketHandlers();
    } else {
      ganttSocket.switchProject(id);
    }
  }

  function setupSocketHandlers() {
    ganttSocket.on('users', users => {
      document.getElementById('users-label').textContent =
        users.length + ' connecté' + (users.length > 1 ? 's' : '');
      const dots = document.getElementById('users-dots');
      dots.innerHTML = '';
      users.slice(0, 5).forEach(u => {
        const d = document.createElement('div');
        d.className = 'user-dot'; d.title = u;
        d.textContent = u[0].toUpperCase();
        dots.appendChild(d);
      });
    });
    ganttSocket.on('user_joined', ({ pseudo: p }) => toast(`${p} a rejoint`));
    ganttSocket.on('user_left',   ({ pseudo: p }) => toast(`${p} a quitté`));
    ganttSocket.on('full_update', ({ data, by }) => {
      ganttApp.applyFullUpdate(data);
      toast(`${by} a mis à jour le planning`);
    });
  }

  /* ── Créer un planning ── */
  window.creerPlanning = async () => {
    const name = prompt('Nom du nouveau planning :');
    if (!name?.trim()) return;
    const res = await fetch('/api/projects', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name.trim(), user: window._pseudo })
    }).then(r => r.json());
    await refreshProjectsList();
    await loadProject(res.id, window._pseudo, false);
  };

  /* ── Renommer ── */
  window.renommerPlanning = () => {
    renommerPlanningId(window._currentProjectId, document.getElementById('project-title').textContent);
  };

  window.renommerPlanningId = async (id, currentName) => {
    const name = prompt('Nouveau nom :', currentName);
    if (!name?.trim() || name.trim() === currentName) return;
    await fetch(`/api/projects/${id}/rename`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name.trim() })
    });
    if (id === window._currentProjectId)
      document.getElementById('project-title').textContent = name.trim();
    await refreshProjectsList();
    toast('Planning renommé', 'ok');
  };

  /* ── Supprimer ── */
  window.supprimerPlanning = async id => {
    if (!confirm('Supprimer ce planning ? Cette action est irréversible.')) return;
    const res = await fetch(`/api/projects/${id}`, { method: 'DELETE' }).then(r => r.json());
    if (res.error) { toast(res.error, 'err'); return; }
    const projects = await fetch('/api/projects').then(r => r.json());
    renderProjectsList(projects, window._pseudo);
    if (id === window._currentProjectId)
      await loadProject(projects[0].id, window._pseudo, false);
    toast('Planning supprimé');
  };

  /* ── Drawer mobile ── */
  window.ouvrirDrawerMobile = async () => {
    const projects = await fetch('/api/projects').then(r => r.json());
    const list = document.getElementById('mobile-drawer-list');
    list.innerHTML = '';
    projects.forEach(p => {
      const div = document.createElement('div');
      div.className = 'proj-item' + (p.id === window._currentProjectId ? ' active' : '');
      div.innerHTML = `<span class="proj-icon">📋</span><span class="proj-name">${p.name}</span>`;
      div.onclick = () => { loadProject(p.id, window._pseudo, false); fermerDrawerMobile(); };
      list.appendChild(div);
    });
    document.getElementById('mobile-drawer').classList.add('show');
  };
  window.fermerDrawerMobile = () => {
    document.getElementById('mobile-drawer').classList.remove('show');
  };

  /* expose pour gantt.js */
  window._loadProject  = (id) => loadProject(id, window._pseudo, false);
  window._getCurrentId = () => window._currentProjectId;

  function toast(msg, type = '') {
    const c = document.getElementById('toast-box');
    const t = document.createElement('div');
    t.className = `toast ${type}`; t.textContent = msg;
    c.appendChild(t); setTimeout(() => t.remove(), 3000);
  }
})();
</script>
</body>
</html>
