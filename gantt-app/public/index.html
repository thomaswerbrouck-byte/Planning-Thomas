<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Planning Collaboratif</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ── Login ── -->
<div id="login-overlay">
  <div class="login-card">
    <div class="login-logo">📅</div>
    <h1>Planning Collaboratif</h1>
    <p id="login-hint">Choisissez votre nom</p>
    <select id="pseudo-input" onchange="document.getElementById('pwd-wrap').style.display='none';document.getElementById('pwd-input').value='';document.getElementById('btn-join').textContent='Rejoindre →'">
      <option value="">-- Choisissez votre nom --</option>
      <optgroup label="Administration">
        <option>Damien</option>
        <option>Cedric</option>
        <option>Thomas</option>
      </optgroup>
      <optgroup label="Visualisation">
        <option>Stephane</option>
        <option>Denis</option>
        <option>Alexis</option>
        <option>William</option>
      </optgroup>
      <optgroup label="Accès filtré">
        <option>ECO</option>
        <option>ASEPTIC</option>
      </optgroup>
    </select>
    <div id="pwd-wrap" style="display:none">
      <input type="password" id="pwd-input" placeholder="Code d'accès" autocomplete="off">
      <div id="pwd-error" style="color:#ef4444;font-size:.75rem;margin-top:4px;display:none">Code incorrect, réessayez.</div>
    </div>
    <button id="btn-join">Rejoindre →</button>
  </div>
</div>

<div class="app">

  <!-- ── Sidebar plannings ── -->
  <div id="projects-sidebar">
    <div id="projects-header">
      <span>Mes plannings</span>
      <button id="btn-sidebar-close" onclick="toggleSidebar()" title="Masquer">‹</button>
    </div>
    <div id="projects-list"></div>
    <button id="btn-new-project" onclick="creerPlanning()">+ Nouveau planning</button>
  </div>
  <div id="sidebar-resizer" title="Redimensionner"></div>
  <button id="btn-sidebar-open" onclick="toggleSidebar()" title="Afficher les plannings">›</button>

  <!-- ── Main ── -->
  <div class="app-main">

    <!-- Top bar -->
    <div id="topbar">
      <button id="mobile-proj-btn" onclick="ouvrirDrawerMobile()">☰ Plannings</button>
      <span class="logo" style="display:none" id="logo-desk">📋</span>
      <h2 id="project-title" title="Double-cliquer pour renommer" ondblclick="renommerPlanning()">Planning</h2>
      <div id="users-bar">
        <span id="users-label">0 connecté</span>
        <div id="users-dots" style="display:flex;gap:3px;margin-left:4px"></div>
      </div>
      <span id="role-badge" class="admin" style="display:none"></span>
      <span id="save-indicator">✓ Sauvegardé</span>
      <button id="btn-logout" onclick="deconnecter()" title="Se déconnecter">⏻</button>
    </div>

    <!-- Toolbar -->
    <div id="toolbar">
      <button class="btn btn-primary admin-only" onclick="ajouterProjet()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Ajouter
      </button>
      <button class="btn btn-success admin-only" onclick="sauvegarder()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Enregistrer
      </button>
      <button class="btn" onclick="scrollAujourdhui()">📍 Aujourd'hui</button>
      <div class="sep admin-only"></div>
      <button class="btn no-eco" onclick="ouvrirConfigTech()">⚙ Attributions</button>
      <button class="btn" onclick="ouvrirConfigCols()">⚙ Colonnes</button>
      <button class="btn admin-only" onclick="toggleHistory()">🕐 Historique</button>
      <div class="sep"></div>
      <div class="zoom-grp">
        <button onclick="setZoom(-2)">−</button>
        <span id="zoomLbl">14px</span>
        <button onclick="setZoom(2)">+</button>
      </div>
      <div class="zoom-grp" title="Hauteur des lignes">
        <button onclick="setRowH(-4)">−</button>
        <span id="rowHLbl" style="min-width:36px">42px</span>
        <button onclick="setRowH(4)">+</button>
      </div>
      <div class="year-sel">
        <span>Année</span>
        <select id="anneeSelect" onchange="changerAnnee(this.value)"></select>
      </div>
      <button class="btn" id="btn-toggle-arrows" onclick="toggleArrows()" title="Afficher/masquer les liaisons">🔗 Liaisons</button>
      <div class="sep"></div>
      <button class="btn btn-danger" onclick="ouvrirExportPDF()">📄 PDF</button>
      <button class="btn" style="background:#16a34a;color:white" onclick="ouvrirExportExcel()">📊 Excel</button>
    </div>

    <!-- Gantt -->
    <div id="gantt-wrap">
      <div id="gantt-inner"></div>
    </div>

    <!-- Mobile -->
    <div id="mobile-view"></div>

  </div><!-- /app-main -->
</div><!-- /app -->

<!-- Drawer mobile plannings -->
<div id="mobile-drawer">
  <div id="mobile-drawer-bg" onclick="fermerDrawerMobile()"></div>
  <div id="mobile-drawer-panel">
    <div class="drawer-header">
      <span>Mes plannings</span>
      <button onclick="fermerDrawerMobile()">✕</button>
    </div>
    <div id="mobile-drawer-list"></div>
    <button id="mobile-drawer-new" onclick="creerPlanning();fermerDrawerMobile()">+ Nouveau planning</button>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="modal">
  <div class="modal" id="modal-body"></div>
</div>

<!-- History -->
<div id="history-panel">
  <div id="history-header">
    <span>🕐 Historique</span>
    <button class="btn" onclick="toggleHistory(false)" style="padding:3px 10px">✕</button>
  </div>
  <div id="history-list"></div>
</div>

<!-- Bouton masquer en-tête (paysage mobile) -->
<button id="btn-compact-header" onclick="toggleCompactHeader()" title="Masquer/afficher l'en-tête">▲ Masquer</button>

<!-- Toast -->
<div id="toast-box"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="websocket.js"></script>
<script src="gantt.js"></script>
<script>
(async () => {
  /* ── Login ── */
  const overlay = document.getElementById('login-overlay');
  const input   = document.getElementById('pseudo-input');
  document.getElementById('btn-join').onclick = join;
  document.getElementById('pwd-input').addEventListener('keydown', e => { if (e.key === 'Enter') join(); });

  function join() {
    const p = input.value.trim();
    if (!p) { input.focus(); return; }

    /* Vérifier si un code est requis */
    const pwdRequired = window.PASSWORDS?.[p];
    if (pwdRequired) {
      const pwdWrap  = document.getElementById('pwd-wrap');
      const pwdInput = document.getElementById('pwd-input');
      const pwdError = document.getElementById('pwd-error');

      if (pwdWrap.style.display === 'none') {
        /* Première étape : afficher le champ code */
        pwdWrap.style.display = '';
        pwdInput.focus();
        document.getElementById('btn-join').textContent = 'Confirmer →';
        document.getElementById('login-hint').textContent = 'Entrez votre code d\'accès';
        return;
      }

      /* Deuxième étape : vérifier le code */
      if (pwdInput.value !== pwdRequired) {
        pwdError.style.display = '';
        pwdInput.value = '';
        pwdInput.style.borderColor = '#ef4444';
        pwdInput.focus();
        return;
      }
      pwdError.style.display = 'none';
    }

    overlay.style.display = 'none';

    /* Appliquer le rôle et afficher le badge */
    applyRole(p);
    const badge  = document.getElementById('role-badge');
    const role   = window._userRole;
    const labels = { admin: '✏ Admin', viewer: '👁 Lecture', eco: '🌿 ECO', aseptic: '🧪 ASEPTIC' };
    badge.textContent = labels[role] || role;
    badge.className   = role;
    badge.style.display = '';

    startApp(p);
  }

  async function startApp(pseudo) {
    try {
      const projects = await fetch('/api/projects').then(r => r.json());

      if (!projects || projects.length === 0) {
        document.getElementById('gantt-inner').innerHTML =
          '<div style="padding:40px;color:#ef4444">Erreur : aucun planning trouvé. Rechargez la page.</div>';
        return;
      }

      /* Mode ECO / ASEPTIC : charger uniquement le planning TTE */
      if (window._userRole === 'eco' || window._userRole === 'aseptic') {
        const tte = projects.find(p => p.name?.toUpperCase().includes('TTE'))
                 || projects[0];
        await loadProject(tte.id, pseudo, true);
        return;
      }

      renderProjectsList(projects, pseudo);
      await loadProject(projects[0].id, pseudo, true);
    } catch(err) {
      console.error('Erreur startApp:', err);
      document.getElementById('gantt-inner').innerHTML =
        '<div style="padding:40px;color:#ef4444">Erreur de chargement : ' + err.message + '</div>';
    }
  }

  /* ── Liste des plannings ── */
  window._pseudo = '';
  window._currentProjectId = '';

  function renderProjectsList(projects, pseudo) {
    window._pseudo = pseudo;
    window._projectsList = projects;
    const list = document.getElementById('projects-list');
    list.innerHTML = '';
    projects.forEach((p, idx) => {
      const div = document.createElement('div');
      div.className = 'proj-item' + (p.id === window._currentProjectId ? ' active' : '');
      div.dataset.id = p.id;
      div.innerHTML = `
        <span class="proj-icon">📋</span>
        <span class="proj-name" title="${p.name}">${p.name}</span>
        <div class="proj-actions">
          <button class="proj-btn" onclick="reorderPlanning('${p.id}',-1)" title="Monter" ${idx===0?'style="opacity:.3;pointer-events:none"':''}>↑</button>
          <button class="proj-btn" onclick="reorderPlanning('${p.id}',1)"  title="Descendre" ${idx===projects.length-1?'style="opacity:.3;pointer-events:none"':''}>↓</button>
          <button class="proj-btn" onclick="dupliquerPlanning('${p.id}','${p.name}')" title="Dupliquer">⧉</button>
          <button class="proj-btn" onclick="renommerPlanningId('${p.id}','${p.name}')" title="Renommer">✏</button>
          <button class="proj-btn del" onclick="supprimerPlanning('${p.id}')" title="Supprimer">✕</button>
        </div>`;
      div.addEventListener('click', e => {
        if (e.target.closest('.proj-actions')) return;
        loadProject(p.id, pseudo, false);
      });
      list.appendChild(div);
    });
  }

  /* ── Réordonner les plannings ── */
  window.reorderPlanning = async (id, dir) => {
    const projects = [...window._projectsList];
    const idx = projects.findIndex(p => p.id === id);
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= projects.length) return;
    [projects[idx], projects[newIdx]] = [projects[newIdx], projects[idx]];
    await fetch('/api/projects/reorder', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ids: projects.map(p => p.id) })
    });
    await refreshProjectsList();
  };

  /* ── Masquer / afficher la sidebar ── */
  window.toggleSidebar = () => {
    const sidebar = document.getElementById('projects-sidebar');
    const btnOpen = document.getElementById('btn-sidebar-open');
    const hidden  = sidebar.style.display === 'none';
    sidebar.style.display = hidden ? '' : 'none';
    btnOpen.style.display  = hidden ? 'none' : 'flex';
    localStorage.setItem('sidebarHidden', hidden ? '0' : '1');
  };
  /* Restaurer l'état sidebar au démarrage */
  if (localStorage.getItem('sidebarHidden') === '1') {
    document.getElementById('projects-sidebar').style.display = 'none';
    document.getElementById('btn-sidebar-open').style.display = 'flex';
  }

  /* ── Redimensionnement sidebar ── */
  const sidebarEl  = document.getElementById('projects-sidebar');
  const resizerEl  = document.getElementById('sidebar-resizer');
  const SIDEBAR_MIN = 120, SIDEBAR_MAX = 480;

  // Restaurer la largeur sauvegardée
  const savedW = localStorage.getItem('sidebarWidth');
  if (savedW) sidebarEl.style.width = savedW + 'px';

  let resizing = false, resizeX0 = 0, resizeW0 = 0;

  resizerEl.addEventListener('mousedown', e => {
    resizing  = true;
    resizeX0  = e.clientX;
    resizeW0  = sidebarEl.offsetWidth;
    resizerEl.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!resizing) return;
    const newW = Math.max(SIDEBAR_MIN, Math.min(SIDEBAR_MAX, resizeW0 + (e.clientX - resizeX0)));
    sidebarEl.style.width = newW + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!resizing) return;
    resizing = false;
    resizerEl.classList.remove('active');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    localStorage.setItem('sidebarWidth', sidebarEl.offsetWidth);
  });

  async function refreshProjectsList() {
    const projects = await fetch('/api/projects').then(r => r.json());
    renderProjectsList(projects, window._pseudo);
  }

  /* ── Charger un planning ── */
  async function loadProject(id, pseudo, first) {
    /* Sauvegarder le projet courant avant de changer */
    if (window._currentProjectId && window._currentProjectId !== id) {
      try { await window.sauvegarder?.(); } catch(e) {}
    }
    window._currentProjectId = id;
    let proj;
    try {
      proj = await fetch(`/api/projects/${id}`).then(r => r.json());
    } catch(err) {
      document.getElementById('gantt-inner').innerHTML =
        `<div style="padding:40px;color:#ef4444">Erreur réseau : ${err.message}</div>`;
      return;
    }
    if (proj.error) {
      document.getElementById('gantt-inner').innerHTML =
        `<div style="padding:40px;color:#ef4444">Erreur projet : ${proj.error}</div>`;
      return;
    }

    document.getElementById('project-title').textContent = proj.name || 'Planning';
    document.querySelectorAll('.proj-item').forEach(el =>
      el.classList.toggle('active', el.dataset.id === id));

    const data = proj.data || {};
    ganttApp.init(data, pseudo, id);

    /* Forcer le filtre selon le rôle */
    if (window._userRole === 'eco' || window._userRole === 'aseptic') window._applyRoleFilter?.();

    if (first) {
      ganttSocket.connect(pseudo, id);
      setupSocketHandlers();
    } else {
      ganttSocket.switchProject(id);
    }
  }

  function setupSocketHandlers() {
    ganttSocket.on('users', users => {
      document.getElementById('users-label').textContent =
        users.length + ' connecté' + (users.length > 1 ? 's' : '');
      const dots = document.getElementById('users-dots');
      dots.innerHTML = '';
      users.slice(0, 5).forEach(u => {
        const d = document.createElement('div');
        d.className = 'user-dot'; d.title = u;
        d.textContent = u[0].toUpperCase();
        dots.appendChild(d);
      });
    });
    ganttSocket.on('user_joined', ({ pseudo: p }) => toast(`${p} a rejoint`));
    ganttSocket.on('user_left',   ({ pseudo: p }) => toast(`${p} a quitté`));
    ganttSocket.on('full_update', ({ data, by }) => {
      ganttApp.applyFullUpdate(data);
      toast(`${by} a mis à jour le planning`);
    });
  }

  /* ── Créer un planning ── */
  window.creerPlanning = async () => {
    const name = prompt('Nom du nouveau planning :');
    if (!name?.trim()) return;
    const res = await fetch('/api/projects', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name.trim(), user: window._pseudo })
    }).then(r => r.json());
    await refreshProjectsList();
    await loadProject(res.id, window._pseudo, false);
  };

  /* ── Renommer ── */
  window.renommerPlanning = () => {
    renommerPlanningId(window._currentProjectId, document.getElementById('project-title').textContent);
  };

  window.renommerPlanningId = async (id, currentName) => {
    const name = prompt('Nouveau nom :', currentName);
    if (!name?.trim() || name.trim() === currentName) return;
    await fetch(`/api/projects/${id}/rename`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name.trim() })
    });
    if (id === window._currentProjectId)
      document.getElementById('project-title').textContent = name.trim();
    await refreshProjectsList();
    toast('Planning renommé', 'ok');
  };

  /* ── Dupliquer ── */
  window.dupliquerPlanning = async (id, name) => {
    const newName = prompt('Nom du planning dupliqué :', name + ' (copie)');
    if (!newName?.trim()) return;
    const res = await fetch(`/api/projects/${id}/duplicate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: newName.trim(), user: window._pseudo })
    }).then(r => r.json());
    if (res.error) { toast(res.error, 'err'); return; }
    await refreshProjectsList();
    await loadProject(res.id, window._pseudo, false);
    toast('Planning dupliqué', 'ok');
  };

  /* ── Supprimer ── */
  window.supprimerPlanning = async id => {
    if (!confirm('Supprimer ce planning ? Cette action est irréversible.')) return;
    const res = await fetch(`/api/projects/${id}`, { method: 'DELETE' }).then(r => r.json());
    if (res.error) { toast(res.error, 'err'); return; }
    const projects = await fetch('/api/projects').then(r => r.json());
    renderProjectsList(projects, window._pseudo);
    if (id === window._currentProjectId)
      await loadProject(projects[0].id, window._pseudo, false);
    toast('Planning supprimé');
  };

  /* ── Drawer mobile ── */
  window.ouvrirDrawerMobile = async () => {
    const projects = await fetch('/api/projects').then(r => r.json());
    const list = document.getElementById('mobile-drawer-list');
    list.innerHTML = '';
    projects.forEach(p => {
      const div = document.createElement('div');
      div.className = 'proj-item' + (p.id === window._currentProjectId ? ' active' : '');
      div.innerHTML = `<span class="proj-icon">📋</span><span class="proj-name">${p.name}</span>`;
      div.onclick = () => { loadProject(p.id, window._pseudo, false); fermerDrawerMobile(); };
      list.appendChild(div);
    });
    document.getElementById('mobile-drawer').classList.add('show');
  };
  window.fermerDrawerMobile = () => {
    document.getElementById('mobile-drawer').classList.remove('show');
  };

  /* ── Masquer/afficher l'en-tête en mode paysage mobile ── */
  window.toggleCompactHeader = () => {
    const compact = document.body.classList.toggle('header-compact');
    document.getElementById('btn-compact-header').textContent = compact ? '▼ En-tête' : '▲ Masquer';
    localStorage.setItem('headerCompact', compact ? '1' : '0');
  };
  /* Restaurer l'état */
  if (localStorage.getItem('headerCompact') === '1') {
    document.body.classList.add('header-compact');
    const btn = document.getElementById('btn-compact-header');
    if (btn) btn.textContent = '▼ En-tête';
  }

  /* expose pour gantt.js */
  window._loadProject  = (id) => loadProject(id, window._pseudo, false);
  window._getCurrentId = () => window._currentProjectId;

  window.deconnecter = () => {
    document.body.classList.remove('read-only', 'role-eco');
    document.getElementById('role-badge').style.display = 'none';
    document.getElementById('pseudo-input').value = '';
    document.getElementById('pwd-wrap').style.display = 'none';
    document.getElementById('pwd-input').value = '';
    document.getElementById('btn-join').textContent = 'Rejoindre →';
    document.getElementById('login-hint').textContent = 'Choisissez votre nom';
    document.getElementById('login-overlay').style.display = '';
    window._userRole = 'viewer';
    window._pseudo = '';
  };

  function toast(msg, type = '') {
    const c = document.getElementById('toast-box');
    const t = document.createElement('div');
    t.className = `toast ${type}`; t.textContent = msg;
    c.appendChild(t); setTimeout(() => t.remove(), 3000);
  }
})();
</script>
</body>
</html>
