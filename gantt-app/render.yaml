services:
  - type: web
    name: gantt-app
    env: node
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_DIR
        value: /data
    disk:
      name: gantt-data
      mountPath: /data
      sizeGB: 1
